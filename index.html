<!doctype html>
<html lang="fi">
  <head>
    <meta charset="utf-8" />
    <link rel="icon" type="image/x-icon" href="./kuvat/pyora.png">
    <link rel="stylesheet" href="css/style.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Gloria+Hallelujah&family=Sigmar+One&display=swap"
      rel="stylesheet"
    />
    <title>Kesän pyöräilyretket</title>
  </head>
  <body>

    <!--Sivun tausta-->
    <div class="tausta">

      <!--Valkoinen laatikko-->
      <div class="todo-lista">
        <h2>Pyöräilysuunnitelmat <img src="kuvat/pyora2.png" /></h2>

        <!--Lomake-->
        <div class="lomake">
          <form id="harjoitusForm">
            <input
              type="text"
              id="inputHarjoitus"
              maxlength="25"
              placeholder="Lisää kuvaus reitistä"
            /><br />
            <input
              type="number"
              id="inputMatka"
              placeholder="Lisää kilometrit"
            /><br />
            <button type="submit" id="lisaaNappi">Lisää suunnitelma</button>
          </form>
        </div>

        <!--Laskuri-->
        <div class="laskurit">
          <p id="tehdyt">Tehdyt: 0</p>
          <p id="tekematta">Tekemättä: 0</p>
        </div>
      </div>

      <!--PostIt seinä-->
      <div id="postIt"></div>
    </div>

    <script src="js/script.js"></script>
  </body>
</html>
